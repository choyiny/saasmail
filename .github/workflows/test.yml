name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  vitest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
      - run: yarn install --frozen-lockfile
      - name: Seed wrangler.jsonc (gitignored; needed by vitest-pool-workers)
        run: cp wrangler.jsonc.example wrangler.jsonc
      - run: yarn test
